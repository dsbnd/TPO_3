plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // TestNG для запуска тестов
    testImplementation 'org.testng:testng:7.8.0'
    // Актуальный Selenium WebDriver 4
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.18.1'
}

test {
    useTestNG()
}